<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER ADMIN | REMOTE CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050509; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Area scroll khusus konten */
        .scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 160px; /* Agar tidak tertutup nav bawah */
            -webkit-overflow-scrolling: touch;
        }

        .page { display: none; width: 100%; flex-direction: column; }
        .page.active { display: flex; animation: fadeIn 0.3s ease-out forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar */
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }

        /* Switch Toggle */
        .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(18px); }
    </style>
</head>
<body class="text-white p-5">

    <div class="flex items-center justify-between mb-6 px-2 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center font-black text-xl shadow-lg shadow-red-900/20">A</div>
            <div>
                <h1 class="text-lg font-black tracking-tighter uppercase italic text-red-500 leading-none">Remote Admin</h1>
                <span class="text-[8px] font-bold text-slate-500 tracking-[0.2em] uppercase">Control Panel v2.5</span>
            </div>
        </div>
        <div id="statusToast" class="bg-emerald-500/20 text-emerald-400 text-[9px] font-black px-3 py-1 rounded-full border border-emerald-500/30 opacity-0 transition-all uppercase">Updated</div>
    </div>

    <div class="scroll-area px-2">
        
        <div id="pageConfig" class="page active">
            <p class="text-[10px] font-black text-blue-500 tracking-[0.4em] uppercase mb-5 ml-1 italic">Button List Configuration</p>
            <div id="editorGrid" class="space-y-4">
                </div>
        </div>

        <div id="pageServer" class="page items-center justify-center pt-10">
            <div class="glass w-full max-w-sm p-10 rounded-[3.5rem] text-center border-white/10 shadow-2xl">
                <div id="serverIcon" class="w-24 h-24 rounded-full mx-auto mb-6 flex items-center justify-center text-5xl border-4 transition-all">🔓</div>
                <h2 id="serverStatusLabel" class="text-2xl font-black mb-2 uppercase tracking-tighter">Server Online</h2>
                <p class="text-[10px] text-slate-500 mb-10 tracking-[0.2em] uppercase font-bold">Kunci akses seluruh user</p>
                
                <button onclick="toggleServer()" id="serverBtn" class="w-full py-6 rounded-[2rem] font-black transition-all shadow-xl uppercase tracking-widest text-sm">
                    TUTUP SERVER
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-8 left-6 right-6 grid grid-cols-2 gap-4 shrink-0">
        <button onclick="showPage('pageConfig')" class="glass p-6 rounded-[2.5rem] flex items-center justify-between active:scale-95 transition-transform group">
            <div class="text-left">
                <h3 class="font-black text-lg group-active:text-blue-400">CONFIG</h3>
                <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Buttons</p>
            </div>
            <div class="text-2xl opacity-50">🛠️</div>
        </button>

        <button onclick="showPage('pageServer')" class="glass p-6 rounded-[2.5rem] flex items-center justify-between active:scale-95 transition-transform group">
            <div class="text-left">
                <h3 class="font-black text-lg group-active:text-red-400">SERVER</h3>
                <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">Master</p>
            </div>
            <div class="text-2xl opacity-50">🔒</div>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyC_CzpM8loteQzOzfEWCz5cyhRhM1X8RTY",
            authDomain: "control-admin-b96e2.firebaseapp.com",
            databaseURL: "https://control-admin-b96e2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "control-admin-b96e2",
            storageBucket: "control-admin-b96e2.firebasestorage.app",
            messagingSenderId: "17029274720",
            appId: "1:17029274720:web:b3f3ca1a74f3063d4af705",
            measurementId: "G-3LWYFFLFJQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'remote_control');

        // 1. Generate UI Editor untuk 10 Tombol
        const editorGrid = document.getElementById('editorGrid');
        for (let i = 1; i <= 10; i++) {
            editorGrid.innerHTML += `
                <div class="glass p-6 rounded-[2.5rem] space-y-4 border-white/5 shadow-lg">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-[10px] font-black text-blue-400 tracking-widest uppercase italic">Slot Link #${i}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] font-bold text-slate-500 uppercase">Hide</span>
                            <label class="switch">
                                <input type="checkbox" id="hide_${i}" onchange="saveData(${i})">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="name_${i}" placeholder="Nama Tombol (Contoh: VIP Folder)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-xs outline-none focus:border-blue-500 font-bold">
                        <input type="text" id="url_${i}" placeholder="Link Mediafire (https://...)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-[10px] outline-none focus:border-sky-500 text-slate-400">
                    </div>
                    <button onclick="saveData(${i})" class="w-full bg-blue-600/20 text-blue-400 border border-blue-500/30 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest active:bg-blue-600 active:text-white transition-all">Simpan Perubahan</button>
                </div>
            `;
        }

        // 2. Load Data Awal dari Firebase (Anti Reset)
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val() || {};
            for (let i = 1; i <= 10; i++) {
                const item = data[`btn_${i}`] || { name: '', url: '', hidden: false };
                document.getElementById(`name_${i}`).value = item.name || "";
                document.getElementById(`url_${i}`).value = item.url || "";
                document.getElementById(`hide_${i}`).checked = item.hidden || false;
            }
            updateServerUI(data.serverStatus);
        });

        // 3. Fungsi Simpan Per Tombol
        window.saveData = (id) => {
            const nameVal = document.getElementById(`name_${id}`).value;
            const urlVal = document.getElementById(`url_${id}`).value;
            const hideVal = document.getElementById(`hide_${id}`).checked;
            
            update(ref(db, `remote_control/btn_${id}`), {
                name: nameVal,
                url: urlVal,
                hidden: hideVal
            }).then(() => {
                const toast = document.getElementById('statusToast');
                toast.style.opacity = "1";
                setTimeout(() => toast.style.opacity = "0", 1500);
            });
        };

        // 4. Fungsi Tutup/Buka Server
        let serverIsOn = true;
        window.toggleServer = () => {
            serverIsOn = !serverIsOn;
            update(ref(db, 'remote_control'), { serverStatus: serverIsOn });
        };

        function updateServerUI(isOn) {
            serverIsOn = isOn;
            const btn = document.getElementById('serverBtn');
            const icon = document.getElementById('serverIcon');
            const label = document.getElementById('serverStatusLabel');
            
            if(isOn) {
                btn.className = "w-full py-6 rounded-[2rem] font-black bg-emerald-500 text-black shadow-emerald-500/20";
                btn.innerText = "TUTUP SERVER (OFF)";
                icon.innerText = "🔓"; icon.style.borderColor = "#10b981"; icon.style.color = "#10b981";
                label.innerText = "Server Online";
            } else {
                btn.className = "w-full py-6 rounded-[2rem] font-black bg-red-600 text-white shadow-red-600/20";
                btn.innerText = "BUKA SERVER (ON)";
                icon.innerText = "🔒"; icon.style.borderColor = "#ef4444"; icon.style.color = "#ef4444";
                label.innerText = "Server Closed";
            }
        }

        // Navigasi Antar Halaman
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>
</body>
</html>
